spring:
  cache:
    type: redis
  datasource:
    # 开发环境连本地库
    url: jdbc:mysql://localhost:3306/exam_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&cachePrepStmts=true&prepStmtCacheSize=250&prepStmtCacheSqlLimit=2048&useServerPrepStmts=true&rewriteBatchedStatements=true
    username: root
    password: llf5201314  # 开发环境可以直接写，方便调试
    driver-class-name: com.mysql.cj.jdbc.Driver

    # HikariCP 连接池优化配置（开发环境）
    hikari:
      # 连接池名称，便于监控识别
      pool-name: ExeSystemHikariCP-Dev
      # 最小空闲连接数（开发环境适当降低以节省资源）
      minimum-idle: 5
      # 最大连接池大小（开发环境设置较小值）
      maximum-pool-size: 20
      # 连接超时时间（毫秒）- 客户端等待连接的最大时间
      connection-timeout: 30000
      # 空闲连接超时时间（毫秒）- 连接在池中空闲的最大时间
      idle-timeout: 600000
      # 连接最大存活时间（毫秒）- 连接在池中的最大生命周期
      max-lifetime: 1800000
      # HikariCP推荐不设置connection-test-query，使用JDBC4的isValid()
      # connection-test-query: SELECT 1
      # 自动提交
      auto-commit: true
      # 连接初始化 SQL
      connection-init-sql: SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
      # 泄漏检测阈值（毫秒）- 超过此时间未归还的连接将被记录
      leak-detection-threshold: 60000
      # 验证超时时间（毫秒）
      validation-timeout: 5000
      # 启用JMX监控（开发环境也启用，方便排查问题）
      register-mbeans: true
  data:
    redis:
      host: localhost
      port: 6379
      # 开发环境Redis通常无密码
      # password:
      # 连接超时时间（毫秒）
      timeout: 5000
      # 数据库索引（默认0）
      database: 0
      lettuce:
        pool:
          # 最大连接数（开发环境适中）
          max-active: 50
          # 最大空闲连接
          max-idle: 20
          # 最小空闲连接
          min-idle: 5
          # 连接池最大阻塞等待时间（毫秒，-1表示无限制）
          max-wait: 3000
        # 关闭超时时间（毫秒）
        shutdown-timeout: 100

jwt:
  # 开发环境使用的简单密钥
  secret: OThiY2RkYjU5ZDIxZDA4YmRhMGE3YjQxZWRiNTViMTE5YzgzMjgxYjM3MjM5ZDE4OTI5M2ExZDAxYjY1ZGMxZA==
